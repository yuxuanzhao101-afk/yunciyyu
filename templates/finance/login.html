{% extends "base.html" %}

{% block title %}财务密码验证 - yunicyyu{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        max-width: 400px;
        margin: 100px auto;
        padding: 40px 30px;
        background: rgba(255,255,255,0.05);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.1);
    }
    
    .login-title {
        text-align: center;
        font-size: 1.5rem;
        color: rgba(255,255,255,0.9);
        margin-bottom: 30px;
    }
    
    .login-title i {
        color: #667eea;
        margin-right: 10px;
    }
    
    .login-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    
    .login-input {
        background: rgba(30, 30, 50, 0.95);
        border: 2px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        padding: 14px 20px;
        font-size: 1rem;
        color: #fff;
        width: 100%;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }
    
    .login-input:focus {
        outline: none;
        border-color: #667eea;
        background: rgba(30, 30, 50, 1);
    }
    
    .login-input::placeholder {
        color: rgba(255,255,255,0.4);
    }
    
    .login-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 12px;
        padding: 14px 20px;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 100%;
    }
    
    .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }
    
    .login-error {
        background: rgba(245, 87, 108, 0.15);
        border: 1px solid rgba(245, 87, 108, 0.3);
        border-radius: 10px;
        padding: 12px 16px;
        color: #f5576c;
        font-size: 0.9rem;
        text-align: center;
        margin-bottom: 10px;
    }
    
    .login-hint {
        text-align: center;
        color: rgba(255,255,255,0.5);
        font-size: 0.85rem;
        margin-top: 20px;
    }
    
    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s ease;
    }
    
    .back-link:hover {
        color: #667eea;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <h2 class="login-title"><i class="fas fa-lock"></i>财务密码验证</h2>
    
    {% if error %}
    <div class="login-error">
        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}
    
    <form class="login-form" method="POST">
        <input type="password" class="login-input" name="password" 
               placeholder="请输入财务密码" required autofocus>
        <button type="submit" class="login-btn">
            <i class="fas fa-sign-in-alt me-2"></i>验证
        </button>
    </form>
    
    <p class="login-hint">请输入密码以访问财务模块</p>
    <a href="{{ url_for('index') }}" class="back-link">
        <i class="fas fa-arrow-left me-2"></i>返回首页
    </a>
</div>
{% endblock %}
