{% extends "base.html" %}

{% block title %}设置财务密码 - yunicyyu{% endblock %}

{% block extra_css %}
<style>
    .password-container {
        max-width: 400px;
        margin: 100px auto;
        padding: 40px 30px;
        background: rgba(255,255,255,0.05);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.1);
    }
    
    .password-title {
        text-align: center;
        font-size: 1.5rem;
        color: rgba(255,255,255,0.9);
        margin-bottom: 20px;
    }
    
    .password-title i {
        color: #667eea;
        margin-right: 10px;
    }
    
    .password-desc {
        text-align: center;
        color: rgba(255,255,255,0.6);
        font-size: 0.9rem;
        margin-bottom: 30px;
        line-height: 1.6;
    }
    
    .password-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    
    .password-input {
        background: rgba(30, 30, 50, 0.95);
        border: 2px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        padding: 14px 20px;
        font-size: 1rem;
        color: #fff;
        width: 100%;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }
    
    .password-input:focus {
        outline: none;
        border-color: #667eea;
        background: rgba(30, 30, 50, 1);
    }
    
    .password-input::placeholder {
        color: rgba(255,255,255,0.4);
    }
    
    .password-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 12px;
        padding: 14px 20px;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 100%;
    }
    
    .password-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }
    
    .password-error {
        background: rgba(245, 87, 108, 0.15);
        border: 1px solid rgba(245, 87, 108, 0.3);
        border-radius: 10px;
        padding: 12px 16px;
        color: #f5576c;
        font-size: 0.9rem;
        text-align: center;
        margin-bottom: 10px;
    }
    
    .password-hint {
        text-align: center;
        color: rgba(255,255,255,0.5);
        font-size: 0.85rem;
        margin-top: 15px;
    }
    
    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s ease;
    }
    
    .back-link:hover {
        color: #667eea;
    }
</style>
{% endblock %}

{% block content %}
<div class="password-container">
    <h2 class="password-title"><i class="fas fa-key"></i>设置财务密码</h2>
    <p class="password-desc">
        设置密码后，访问财务模块需要先验证密码<br>
        保护你的财务数据安全
    </p>
    
    {% if error %}
    <div class="password-error">
        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}
    
    <form class="password-form" method="POST">
        <input type="password" class="password-input" name="password" 
               placeholder="请输入密码（至少4位）" required minlength="4" autofocus>
        <button type="submit" class="password-btn">
            <i class="fas fa-save me-2"></i>设置密码
        </button>
    </form>
    
    <p class="password-hint">密码至少4位，建议使用容易记住的数字</p>
    <a href="{{ url_for('index') }}" class="back-link">
        <i class="fas fa-arrow-left me-2"></i>返回首页
    </a>
</div>
{% endblock %}
